name: Warden

# Disabled scaffolding. To enable Warden later, add the pull_request trigger below
# and change the job condition from false to true.
on:
  workflow_dispatch:
  # pull_request:
  #   types: [opened, synchronize, reopened]

# contents: write is required for resolving review threads.
permissions:
  contents: write
  pull-requests: write

env:
  WARDEN_ANTHROPIC_API_KEY: ${{ secrets.WARDEN_ANTHROPIC_API_KEY }}
  WARDEN_MODEL: ${{ secrets.WARDEN_MODEL }}

jobs:
  review:
    if: ${{ false }}
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - uses: getsentry/warden@42571ec65d2947319a52236d3dea6a3dca7aeae1 # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
