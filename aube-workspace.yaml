packages:
  - infra
  - apps/*
  - packages/*
blockExoticSubdeps: true
minimumReleaseAge: 720
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 3600
patchedDependencies:
  drizzle-orm@1.0.0-rc.2: patches/drizzle-orm@1.0.0-rc.2.patch
allowBuilds:
  "@rocicorp/zero-sqlite3": true
  core-js: false
  esbuild: false
  msgpackr-extract: false
  msw: false
  protobufjs: false
  tree-sitter-python: false
